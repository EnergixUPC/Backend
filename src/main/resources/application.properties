spring.application.name=Backend-SEMS

# Spring DataSource Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/sems?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=TuContraseþa
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Spring Data JPA Configuration
spring.jpa.show-sql=true

# Spring Data JPA Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.naming.physical-strategy=com.backendsems.shared.infrastructure.persistence.jpa.configuration.strategy.SnakeCaseWithPluralizedTablePhysicalNamingStrategy

# Server Configuration
server.port=8080

# Spring Configuration
spring.main.allow-bean-definition-overriding=true

# CORS Configuration
cors.allowed-origins=http://localhost:3000,https://frontend-sems.vercel.app

# Application Information for Documentation
documentation.application.description=SEMS (Smart Energy Management System) Backend API
documentation.application.version=v1.0.0

# JWT Configuration
jwt.secret=SEMSSecretKeyForJWTTokenGenerationAndValidation2025
jwt.expiration=86400000

# OpenAPI Configuration
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
