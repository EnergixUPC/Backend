spring.application.name=Backend-SEMS
#S
# Spring DataSource Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/mysql?sslMode=DISABLED&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:mysql}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:mysql}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Spring Data JPA Configuration
spring.jpa.show-sql=true

# Spring Data JPA Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.naming.physical-strategy=com.backendsems.shared.infrastructure.persistence.jpa.configuration.strategy.SnakeCaseWithPluralizedTablePhysicalNamingStrategy

# Server Configuration
server.port=8080

# Spring Configuration
spring.main.allow-bean-definition-overriding=true

# CORS Configuration
cors.allowed-origins=http://localhost:4200,https://project-octle.vercel.app,https://apistripefinal.onrender.com,http://localhost:3000,https://energixemsapp.vercel.app/login

# Application Information for Documentation
documentation.application.description=SEMS (Smart Energy Management System) Backend API
documentation.application.version=v1.0.0

# JWT Configuration
jwt.secret=SEMSSecretKeyForJWTTokenGenerationAndValidation2025
authorization.jwt.secret=SEMSSecretKeyForJWTTokenGenerationAndValidation2025
jwt.expiration=86400000
authorization.jwt.expiration=86400000

# OpenAPI Configuration
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
