# H2 In-Memory Database for Tests
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.naming.physical-strategy=com.backendsems.shared.infrastructure.persistence.jpa.configuration.strategy.SnakeCaseWithPluralizedTablePhysicalNamingStrategy

# Spring
spring.main.allow-bean-definition-overriding=true

# JWT
jwt.secret=SEMSSecretKeyForJWTTokenGenerationAndValidation2025
authorization.jwt.secret=SEMSSecretKeyForJWTTokenGenerationAndValidation2025
jwt.expiration=86400000
authorization.jwt.expiration=86400000

# CORS
cors.allowed-origins=http://localhost:4200

# Documentation
documentation.application.description=SEMS Backend API
documentation.application.version=v1.0.0
